name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1 
        with:
          xcode-version: latest
          
      - name: Build and Test

        run: xcodebuild -project ToDoTracker.xcodeproj -scheme ToDoTracker -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 14' test
